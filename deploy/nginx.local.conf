# AutoDoc.ai - Local HTTPS (nginx + mkcert)
#
# Drop-in alternative to deploy/Caddyfile.local. Requires mkcert certs at
# deploy/certs/localhost{,-key}.pem (see deploy/README.md).

server {
    listen      80;
    server_name localhost;
    return 301  https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    server_name localhost;

    ssl_certificate     deploy/certs/localhost.pem;
    ssl_certificate_key deploy/certs/localhost-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;

    # Backend: /api/* -> 127.0.0.1:8000/* (strip /api prefix).
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
    }

    # Vite dev server (HTTP) with HMR websocket support.
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # HMR (websocket).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
