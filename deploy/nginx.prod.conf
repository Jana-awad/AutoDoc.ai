# AutoDoc.ai - Production HTTPS (nginx)
#
# Alternative to deploy/Caddyfile for teams already running nginx. This config
# expects Let's Encrypt certificates obtained via certbot, e.g.:
#
#   sudo certbot certonly --nginx -d autodoc.example.com
#
# Replace autodoc.example.com everywhere below.

# Redirect every plaintext request to HTTPS.
server {
    listen      80;
    listen      [::]:80;
    server_name autodoc.example.com;
    return 301  https://$host$request_uri;
}

server {
    listen      443 ssl http2;
    listen      [::]:443 ssl http2;
    server_name autodoc.example.com;

    ssl_certificate     /etc/letsencrypt/live/autodoc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autodoc.example.com/privkey.pem;

    # Modern TLS only.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    client_max_body_size 50M;  # tweak for largest upload you expect

    # Frontend: built SPA with client-side routing fallback.
    root  /var/www/autodoc;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API: strip the /api prefix so it matches FastAPI routes (/auth, /v1/...).
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 120s;
    }
}
